networks:
  idem-dev:
    driver: bridge

volumes:
  # Ideploy/ideploy volumes
  dev_postgres_data:
  dev_redis_data:
  dev_ideploy_data:
  dev_backups_data:
  dev_minio_data:
  # API volumes
  dev_mongodb_data:
  # Services node_modules volumes (pour éviter conflits avec host)
  dev_node_modules_api:
  dev_node_modules_dashboard:
  dev_node_modules_landing:
  dev_node_modules_appgen:
  dev_node_modules_appgen_client:
  dev_node_modules_chart:

services:
  # ==================== INFRASTRUCTURE ====================

  # MongoDB - Main Database for API
  mongodb:
    image: mongo:7.0
    container_name: idem-mongodb-dev
    restart: unless-stopped
    ports:
      - '${MONGODB_PORT:-27017}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: '${MONGODB_USERNAME:-admin}'
      MONGO_INITDB_ROOT_PASSWORD: '${MONGODB_PASSWORD:-admin123}'
      MONGO_INITDB_DATABASE: '${MONGODB_DATABASE:-idem}'
    volumes:
      - dev_mongodb_data:/data/db
      - ./apps/api/mongo-init:/docker-entrypoint-initdb.d
    networks:
      - idem-dev
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - Object Storage (S3-compatible) for API
  minio:
    image: minio/minio:latest
    container_name: idem-minio-dev
    restart: unless-stopped
    ports:
      - '${MINIO_PORT:-9000}:9000' # API
      - '${MINIO_CONSOLE_PORT:-9001}:9001' # Console
    environment:
      MINIO_ROOT_USER: '${MINIO_ROOT_USER:-minioadmin}'
      MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:-minioadmin123}'
    volumes:
      - dev_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - idem-dev
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: '${DB_USERNAME:-ideploy}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
      POSTGRES_DB: '${DB_DATABASE:-ideploy}'
      POSTGRES_HOST_AUTH_METHOD: 'trust'
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    networks:
      - idem-dev
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-ideploy}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: idem-redis-dev
    restart: unless-stopped
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - dev_redis_data:/data
    networks:
      - idem-dev
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: idem-mailpit-dev
    restart: unless-stopped
    ports:
      - '8025:8025' # Web UI
      - '1025:1025' # SMTP
    networks:
      - idem-dev

  # ==================== IDEPLOY (Ideploy) ====================

  ideploy:
    image: ideploy:dev
    container_name: idem-ideploy-dev
    pull_policy: never
    build:
      context: ./apps/ideploy
      dockerfile: ./docker/development/Dockerfile
      args:
        - USER_ID=${USERID:-1000}
        - GROUP_ID=${GROUPID:-1000}
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8000}:8080'
    extra_hosts:
      - 'soketi:host-gateway'
    environment:
      AUTORUN_ENABLED: 'false'
      PUSHER_HOST: 'localhost'
      PUSHER_PORT: '${PUSHER_PORT:-6001}'
      PUSHER_SCHEME: '${PUSHER_SCHEME:-http}'
      PUSHER_APP_ID: '${PUSHER_APP_ID:-ideploy}'
      PUSHER_APP_KEY: '${PUSHER_APP_KEY:-ideploy}'
      PUSHER_APP_SECRET: '${PUSHER_APP_SECRET:-ideploy}'
      PUSHER_BACKEND_HOST: 'soketi'
      PUSHER_BACKEND_PORT: '6001'
      DB_HOST: postgres
      DB_DATABASE: '${DB_DATABASE:-ideploy}'
      DB_USERNAME: '${DB_USERNAME:-ideploy}'
      DB_PASSWORD: '${DB_PASSWORD:-password}'
      SONARQUBE_ADMIN_TOKEN: squ_dc0e5ea5635f3c4b1bdd46d37032485e2ade36f0
      REDIS_HOST: redis
      # IDEM API Configuration
      IDEM_API_URL: 'http://api:3000'
      # AI Configuration
      AI_PROVIDER: '${AI_PROVIDER:-gemini}'
      GEMINI_API_KEY: '${GEMINI_API_KEY:-AIzaSyBLz8JVQU2qnf1NoVWQouJ3xnNkXrAfJg4}'
      OPENAI_API_KEY: '${OPENAI_API_KEY}'
      CLAUDE_API_KEY: '${CLAUDE_API_KEY}'
      # Session Configuration
      SESSION_DOMAIN: 'localhost'
      SANCTUM_STATEFUL_DOMAINS: 'localhost:8000,localhost'
    volumes:
      - ./apps/ideploy:/var/www/html:cached
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - dev_backups_data:/var/www/html/storage/app/backups
    networks:
      - idem-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
      soketi:
        condition: service_started

  soketi:
    image: ideploy-realtime:dev
    container_name: idem-soketi-dev
    pull_policy: never
    build:
      context: ./apps/ideploy
      dockerfile: ./docker/ideploy-realtime/Dockerfile
    restart: unless-stopped
    ports:
      - '${FORWARD_SOKETI_PORT:-6001}:6001'
      - '6002:6002'
    volumes:
      - ./apps/ideploy/storage:/var/www/html/storage
      - ./apps/ideploy/docker/ideploy-realtime/terminal-server.js:/terminal/terminal-server.js
    environment:
      SOKETI_DEBUG: 'false'
      SOKETI_DEFAULT_APP_ID: '${PUSHER_APP_ID:-ideploy}'
      SOKETI_DEFAULT_APP_KEY: '${PUSHER_APP_KEY:-ideploy}'
      SOKETI_DEFAULT_APP_SECRET: '${PUSHER_APP_SECRET:-ideploy}'
    entrypoint: ['/bin/sh', '/soketi-entrypoint.sh']
    networks:
      - idem-dev

  vite-ideploy:
    image: node:24-alpine
    container_name: idem-vite-dev
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      VITE_HOST: '${VITE_HOST:-0.0.0.0}'
      VITE_PORT: '${VITE_PORT:-5173}'
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    volumes:
      - ./apps/ideploy:/var/www/html:cached
      - ./packages:/packages:cached
    command: sh -c "npm install && npm run dev"
    networks:
      - idem-dev

  # ==================== API SERVICE ====================

  api:
    image: idem-api:dev
    container_name: idem-api-dev
    pull_policy: never
    build:
      context: .
      dockerfile: ./Dockerfile/dev/Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - '${API_PORT:-3001}:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      CORS_ALLOWED_ORIGINS: 'http://localhost:4200,http://localhost:4201,http://localhost:3003,http://localhost:3004,http://localhost:8000'
      # MongoDB Configuration
      MONGODB_URI: 'mongodb://${MONGODB_USERNAME:-admin}:${MONGODB_PASSWORD:-admin123}@mongodb:27017/${MONGODB_DATABASE:-idem}?authSource=admin'
      # MinIO Configuration
      MINIO_ENDPOINT: 'minio'
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: '${MINIO_ROOT_USER:-minioadmin}'
      MINIO_SECRET_KEY: '${MINIO_ROOT_PASSWORD:-minioadmin123}'
      MINIO_USE_SSL: 'false'
    volumes:
      - ./apps/api:/app/apps/api:cached
      - ./packages:/app/packages:cached
      - dev_node_modules_api:/app/apps/api/node_modules
    networks:
      - idem-dev
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ==================== MAIN DASHBOARD ====================

  main-dashboard:
    user: '${UID}:${GID}'
    image: idem-main-dashboard:dev
    container_name: idem-dashboard-dev
    pull_policy: never
    build:
      context: .
      dockerfile: ./Dockerfile/dev/Dockerfile.main-dashboard
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - '4200:4200'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: 'http://localhost:3000'
      NEXT_PUBLIC_FIREBASE_API_KEY: '${FIREBASE_API_KEY}'
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: '${FIREBASE_AUTH_DOMAIN}'
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: '${FIREBASE_PROJECT_ID}'
    volumes:
      - ./apps/main-dashboard:/app/apps/main-dashboard:cached
      - ./packages:/app/packages:cached
      - dev_node_modules_dashboard:/app/apps/main-dashboard/node_modules
    networks:
      - idem-dev
    depends_on:
      - api

  # ==================== LANDING PAGE ====================

  landing:
    image: idem-landing:dev
    container_name: idem-landing-dev
    pull_policy: never
    build:
      context: .
      dockerfile: ./Dockerfile/dev/Dockerfile.landing
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - '4201:4201'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: 'http://localhost:3000'
    volumes:
      - ./apps/landing:/app/apps/landing:cached
      - ./packages:/app/packages:cached
      - dev_node_modules_landing:/app/apps/landing/node_modules
    networks:
      - idem-dev
    depends_on:
      - api

  # ==================== APPGEN ====================

  appgen:
    image: idem-appgen:dev
    container_name: idem-appgen-dev
    pull_policy: never
    build:
      context: .
      dockerfile: ./Dockerfile/dev/Dockerfile.appgen
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - '${APPGEN_PORT:-3003}:3003'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: 'http://localhost:3000'
      NEXT_PUBLIC_FIREBASE_API_KEY: '${FIREBASE_API_KEY}'
    volumes:
      - ./apps/appgen:/app/apps/appgen:cached
      - ./packages:/app/packages:cached
      - dev_node_modules_appgen:/app/apps/appgen/node_modules
      - dev_node_modules_appgen_client:/app/apps/appgen/apps/we-dev-client/node_modules
    networks:
      - idem-dev
    depends_on:
      - api

  # ==================== CHART ====================

  chart:
    image: idem-chart:dev
    container_name: idem-chart-dev
    pull_policy: never
    build:
      context: .
      dockerfile: ./Dockerfile/dev/Dockerfile.chart
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - '${CHART_PORT:-3004}:3004'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: 'http://localhost:3000'
    volumes:
      - ./apps/chart:/app/apps/chart:cached
      - ./packages:/app/packages:cached
      - dev_node_modules_chart:/app/apps/chart/node_modules
    networks:
      - idem-dev
    depends_on:
      - api
