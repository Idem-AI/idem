@if (isIncomplete) {
  <div
    class="relative overflow-hidden flex items-stretch rounded-3xl border border-[var(--glass-border)] backdrop-blur-xl mb-8 min-h-[260px]"
    style="background: var(--glass-bg-medium); box-shadow: var(--glass-shadow-lg), 0 0 80px rgba(20,71,230,0.10);"
  >
    <!-- Ambient glow blobs -->
    <div class="absolute -top-24 right-36 size-80 rounded-full bg-blue-600/20 blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-20 left-[5%] size-72 rounded-full bg-cyan-400/15 blur-3xl pointer-events-none"></div>

    <!-- Content -->
    <div class="relative z-10 flex-1 flex flex-col justify-center gap-4 py-8 px-10">

  

      <!-- Title -->
      <h2 class="text-2xl font-bold leading-tight text-text-primary max-w-md m-0">
        {{ 'dashboard.incompleteBanner.title' | translate }}
      </h2>

      <!-- Description -->
      <p class="text-sm leading-relaxed text-text-secondary max-w-sm m-0">
        {{ 'dashboard.incompleteBanner.description' | translate }}
      </p>

      <!-- Missing items — pulsing dot checklist -->
      <div class="flex flex-col gap-2.5">
        @for (element of missingElements; track element) {
          <div class="flex items-center gap-3">
            <!-- Pulsing dot (Tailwind animate-ping) -->
            <span class="relative flex size-2.5 shrink-0">
              <span class="animate-ping absolute inline-flex size-full rounded-full bg-cyan-400 opacity-60"></span>
              <span
                class="relative inline-flex size-2.5 rounded-full bg-cyan-400"
                style="box-shadow: 0 0 8px rgba(34,211,238,0.8);"
              ></span>
            </span>
            <span class="text-sm font-semibold text-text-primary tracking-wide">{{ element }}</span>
          </div>
        }
      </div>

      <!-- CTA -->
      <button (click)="onCompleteClick()" class="inner-button self-start mt-1">
        {{ 'dashboard.incompleteBanner.completeButton' | translate }}
      </button>
    </div>

    <!-- Character — contained in card, anchored to bottom -->
    <div class="relative z-10 shrink-0 w-64 flex items-end justify-center pb-0 pr-4">
      <img
        src="assets/images/character-wave.png"
        alt="Friendly guide"
        class="w-full h-full object-cover select-none"
        style="filter: drop-shadow(0 20px 40px rgba(20,71,230,0.4));"
        draggable="false"
      />
    </div>
  </div>
}
