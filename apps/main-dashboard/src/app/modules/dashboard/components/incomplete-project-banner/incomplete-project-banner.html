@if (isIncomplete) {
  <div class="glass-card border-l-4 border-yellow-500 p-6 mb-6">
    <div class="flex items-start gap-4">
      <!-- Icon -->
      <div class="flex-shrink-0">
        <svg class="w-8 h-8 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
      </div>

      <!-- Content -->
      <div class="flex-1">
        <h3 class="text-lg font-semibold text-gray-100 mb-2">
          {{ 'dashboard.incompleteBanner.title' | translate }}
        </h3>
        <p class="text-gray-300 mb-3">
          {{ 'dashboard.incompleteBanner.description' | translate }}
        </p>
        
        <!-- Missing elements list -->
        <div class="flex flex-wrap gap-2 mb-4">
          @for (element of missingElements; track element) {
            <span class="px-3 py-1 bg-yellow-500/20 text-yellow-300 rounded-full text-sm">
              {{ element }}
            </span>
          }
        </div>

        <!-- Action button -->
        <button
          (click)="onCompleteClick()"
          class="inner-button"
        >
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
          {{ 'dashboard.incompleteBanner.completeButton' | translate }}
        </button>
      </div>

      <!-- Close button (optional) -->
      <button class="flex-shrink-0 text-gray-400 hover:text-gray-200 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </div>
}
