<div
  class="project-tile"
  (click)="cardClick(project()?.id!)"
  tabindex="0"
  role="link"
  [attr.aria-label]="'Open project ' + project()?.name"
>
  <!-- Top Header Row: Logo/Placeholder, Title, and Chevron -->
  <div class="tile-header-row">
    <div class="tile-logo-wrapper">
      @if (project()?.analysisResultModel?.branding?.logo && !logoLoadError()) {
        @if (logoIsInline()) {
          <div class="tile-logo-inner inline-logo" [innerHTML]="project()?.analysisResultModel?.branding?.logo?.svg | safeHtml"></div>
        } @else {
          <div class="tile-logo-inner">
            <img
              [src]="project()?.analysisResultModel?.branding?.logo?.svg"
              [alt]="'dashboard.projectCard.logoAlt' | translate"
              class="tile-logo-img"
              (error)="handleImageError()"
            />
          </div>
        }
      } @else {
        <!-- Premium dynamic gradient placeholder -->
        <div class="tile-logo-placeholder" [style]="placeholderBgStyle()">
          <span class="placeholder-text">{{ monogram() }}</span>
        </div>
      }
    </div>
    
    <div class="tile-title-wrapper">
      <h3 class="tile-title" [attr.title]="project()?.name">
        {{ project()?.name }}
      </h3>
    </div>
    
    <div class="tile-action-chevron" aria-hidden="true">
      <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </div>
  </div>

  <!-- Body Section: Description takes full width for spacing and readability -->
  <div class="tile-body">
    <p class="tile-description">
      {{ project()?.description || 'No description available.' }}
    </p>
  </div>
</div>
