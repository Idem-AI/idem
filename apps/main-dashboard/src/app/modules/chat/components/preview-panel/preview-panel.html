<div class="fixed inset-0 z-[60] flex justify-end">
  <!-- Backdrop -->
  <div
    class="absolute inset-0 bg-black/60 backdrop-blur-sm"
    (click)="closed.emit()"
    aria-hidden="true"
  ></div>

  <!-- Panneau -->
  <div
    class="relative h-full w-full md:w-[760px] bg-[var(--color-bg-darker)] border-l border-[var(--glass-border)] flex flex-col shadow-2xl preview-panel-slide"
  >
    <!-- En-tête -->
    <div class="flex items-center justify-between gap-3 px-4 py-3 border-b border-[var(--glass-border)] shrink-0">
      <h3 class="text-sm font-semibold text-text-primary truncate">{{ title() }}</h3>
      <div class="flex items-center gap-2 shrink-0">
        @if (pdfUrl()) {
          <button
            type="button"
            (click)="downloadRequested.emit()"
            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-[var(--glass-bg-subtle)] hover:bg-[var(--glass-bg-light)] border border-[var(--glass-border)] text-text-secondary text-xs font-semibold transition-all duration-200"
          >
            <i class="pi pi-download text-[11px]"></i>
            {{ 'chat.preview.download' | translate }}
          </button>
        }
        <button
          type="button"
          (click)="closed.emit()"
          class="p-2 text-text-tertiary hover:text-text-primary hover:bg-[var(--glass-bg-light)] rounded-lg transition-all duration-200"
          [attr.aria-label]="'chat.preview.close' | translate"
        >
          <i class="pi pi-times text-sm"></i>
        </button>
      </div>
    </div>

    <!-- Contenu -->
    <div class="flex-1 min-h-0 overflow-y-auto p-2 md:p-4">
      @if (isLoading()) {
        <div class="h-full flex flex-col items-center justify-center gap-3 text-text-tertiary">
          <app-loader />
          <p class="text-xs">{{ 'chat.preview.loading' | translate }}</p>
        </div>
      } @else if (error()) {
        <div class="h-full flex flex-col items-center justify-center gap-4 text-center px-6">
          <i class="pi pi-file-excel text-3xl text-gray-600"></i>
          <p class="text-sm text-text-tertiary">{{ error() }}</p>
          @if (canGenerate()) {
            <button
              type="button"
              (click)="generateRequested.emit()"
              class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-primary hover:bg-primary/80 text-white text-sm font-semibold transition-all duration-200 shadow-lg shadow-primary/20"
            >
              <i class="pi pi-sparkles text-xs"></i>
              {{ 'chat.preview.generateNow' | translate }}
            </button>
          }
        </div>
      } @else if (pdfUrl()) {
        <app-pdf-viewer [pdfSrc]="pdfUrl()" [title]="title()" [showPagination]="true" />
      }
    </div>
  </div>
</div>
