<div class="feature-launcher mx-auto w-full max-w-3xl px-4 py-10 sm:py-14">
  <!-- En-tête centré -->
  <header class="text-center mb-8 sm:mb-10">
    <div
      class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-primary/25 to-accent/15 border border-primary/30 flex items-center justify-center"
    >
      <i class="pi pi-sparkles text-2xl text-accent"></i>
    </div>
    <h2 class="text-2xl sm:text-3xl font-bold text-white text-balance">
      {{ 'chat.launcher.title' | translate: { name: projectName() } }}
    </h2>
    <p class="mt-2 text-sm text-gray-400 max-w-md mx-auto text-pretty">
      {{ 'chat.launcher.subtitle' | translate }}
    </p>
  </header>

  <!-- Grille de fonctionnalités -->
  <div class="launcher-grid">
    @for (tile of tiles(); track tile.kind; let i = $index) {
      <button
        type="button"
        (click)="select(tile)"
        [disabled]="disabled() || tile.state === 'locked'"
        class="choice-tile choice-enter p-4"
        [class.is-disabled]="disabled()"
        [style.--i]="i"
        [attr.aria-label]="(tile.titleKey | translate) + ' — ' + (('chat.launcher.state.' + tile.state) | translate)"
        [title]="tile.state === 'locked' && tile.lockReasonKey ? (tile.lockReasonKey | translate) : ''"
      >
        <div class="flex items-start gap-3">
          <span
            class="feature-icon shrink-0"
            [style.background]="tile.accent + '22'"
            [style.border-color]="tile.accent + '55'"
            [style.color]="tile.accent"
          >
            <i [class]="tile.icon"></i>
          </span>
          <div class="min-w-0 flex-1">
            <h3 class="text-sm font-semibold text-white truncate">{{ tile.titleKey | translate }}</h3>
            <p class="text-xs text-gray-400 leading-snug mt-0.5 line-clamp-2">
              {{ tile.descKey | translate }}
            </p>
          </div>
        </div>

        <!-- Pastille d'état -->
        <div class="mt-3 flex items-center justify-between">
          @switch (tile.state) {
            @case ('ready') {
              <span class="state-pill state-ready">
                <i class="pi pi-check-circle text-[10px]"></i>
                {{ 'chat.launcher.state.ready' | translate }}
              </span>
              <i class="pi pi-eye text-gray-500 text-xs"></i>
            }
            @case ('generate') {
              <span class="state-pill state-generate">
                <i class="pi pi-sparkles text-[10px]"></i>
                {{ 'chat.launcher.state.generate' | translate }}
              </span>
              <i class="pi pi-arrow-right text-gray-500 text-xs"></i>
            }
            @case ('locked') {
              <span class="state-pill state-locked">
                <i class="pi pi-lock text-[10px]"></i>
                {{ 'chat.launcher.state.locked' | translate }}
              </span>
            }
          }
        </div>
      </button>
    }
  </div>

  <p class="mt-7 text-center text-xs text-gray-500">
    <i class="pi pi-comment text-[10px] mr-1"></i>
    {{ 'chat.launcher.hint' | translate }}
  </p>
</div>
