<div class="feature-launcher mx-auto w-full max-w-4xl px-4 py-10 sm:py-14">
  <!-- En-tête centré -->
  <header class="text-center mb-8">
    <h2 class="text-2xl sm:text-3xl font-bold text-white text-balance">
      {{ 'chat.launcher.title' | translate: { name: projectName() } }}
    </h2>
    <p class="mt-2 text-sm text-white/50 max-w-md mx-auto text-pretty">
      {{ 'chat.launcher.subtitle' | translate }}
    </p>
  </header>

  <!-- Appel à compléter l'identité de marque (tant qu'incomplète) -->
  @if (!brandComplete()) {
    <button
      type="button"
      (click)="onCompleteBranding()"
      [disabled]="disabled()"
      class="brand-callout group w-full flex items-center gap-4 mb-7 p-4 rounded-2xl text-left"
    >
      <span class="brand-callout-orb shrink-0">
        <i class="pi pi-palette"></i>
      </span>
      <span class="min-w-0 flex-1">
        <span class="block text-sm font-semibold text-white">
          {{ 'chat.banner.title' | translate }}
        </span>
        <span class="block text-xs text-white/55 mt-0.5">
          {{ 'chat.launcher.brandCalloutHint' | translate }}
        </span>
      </span>
      <span
        class="shrink-0 inline-flex items-center gap-1.5 text-xs font-semibold text-cyan-300 group-hover:text-cyan-200 transition-colors"
      >
        {{ 'chat.banner.cta' | translate }}
        <i class="pi pi-arrow-right text-[10px] group-hover:translate-x-0.5 transition-transform"></i>
      </span>
    </button>
  }

  <!-- Grille de fonctionnalités illustrées -->
  <div class="launcher-grid">
    @for (tile of tiles(); track tile.kind; let i = $index) {
      <button
        type="button"
        (click)="select(tile)"
        [disabled]="disabled() || tile.state === 'locked'"
        class="feature-card choice-enter group"
        [class.is-locked]="tile.state === 'locked'"
        [style.--i]="i"
        [attr.aria-label]="tile.titleKey | translate"
        [title]="tile.state === 'locked' && tile.lockReasonKey ? (tile.lockReasonKey | translate) : ''"
      >
        <!-- Badge d'état discret (coin) -->
        @if (tile.state === 'ready') {
          <span class="card-badge badge-ready" [attr.aria-label]="'chat.launcher.state.ready' | translate">
            <i class="pi pi-check"></i>
          </span>
        } @else if (tile.state === 'locked') {
          <span class="card-badge badge-locked" [attr.aria-label]="'chat.launcher.state.locked' | translate">
            <i class="pi pi-lock"></i>
          </span>
        }

        <!-- Illustration -->
        <div class="card-art">
          <img
            [src]="tile.image"
            [alt]="tile.titleKey | translate"
            class="card-img"
            draggable="false"
          />
        </div>

        <!-- Titre + description -->
        <h3 class="card-title">{{ tile.titleKey | translate }}</h3>
        <p class="card-desc">{{ tile.descKey | translate }}</p>

        <!-- Pied : action ou raison de verrouillage -->
        <div class="card-foot">
          @if (tile.state === 'locked') {
            <span class="text-[11px] text-white/35">
              <i class="pi pi-lock text-[9px] mr-1"></i>{{ tile.lockReasonKey! | translate }}
            </span>
          } @else {
            <span class="card-cta">
              {{ 'chat.launcher.open' | translate }}
              <i class="pi pi-arrow-right text-[10px]"></i>
            </span>
          }
        </div>
      </button>
    }
  </div>

  <p class="mt-8 text-center text-xs text-white/40">
    <i class="pi pi-comment text-[10px] mr-1"></i>{{ 'chat.launcher.hint' | translate }}
  </p>
</div>
