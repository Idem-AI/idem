<div
  class="w-full max-w-md rounded-2xl border border-white/10 bg-white/[0.03] overflow-hidden shadow-lg shadow-black/20"
>
  <div class="flex items-center gap-3 p-4 border-b border-white/5">
    <div
      class="w-10 h-10 rounded-xl bg-primary/15 border border-primary/30 flex items-center justify-center shrink-0"
    >
      <i class="pi pi-sparkles text-primary text-lg"></i>
    </div>
    <div class="min-w-0">
      <h4 class="text-sm font-semibold text-white">
        {{ 'chat.branding.cards.logosTitle' | translate }}
      </h4>
      <p class="text-[11px] text-gray-500">
        {{ 'chat.branding.cards.logosSubtitle' | translate }}
      </p>
    </div>
  </div>

  <div class="p-3 logo-grid" role="radiogroup">
    @for (option of options(); track option.id; let i = $index) {
      <button
        type="button"
        role="radio"
        [attr.aria-checked]="selectedId() === option.id"
        (click)="pick(option)"
        [disabled]="disabled() || (!!selectedId() && selectedId() !== option.id)"
        class="choice-tile choice-enter items-center p-3"
        [class.is-selected]="selectedId() === option.id"
        [class.is-dimmed]="!!selectedId() && selectedId() !== option.id"
        [style.--i]="i"
        [attr.aria-label]="option.name"
      >
        @if (selectedId() === option.id) {
          <span class="choice-check"><i class="pi pi-check"></i></span>
        }
        <span
          class="w-full aspect-square max-h-28 flex items-center justify-center rounded-xl bg-white logo-canvas overflow-hidden"
        >
          @if (isInlineSvg(option)) {
            <span class="logo-svg" [innerHTML]="option.svg | safeHtml"></span>
          } @else if (option.svg) {
            <img [src]="option.svg" [alt]="option.name" class="max-h-20 max-w-[80%] object-contain" />
          }
        </span>
        <span class="mt-2 text-[11px] font-medium text-gray-300 truncate w-full text-center">
          {{ option.name }}
        </span>
      </button>
    }
  </div>
</div>
