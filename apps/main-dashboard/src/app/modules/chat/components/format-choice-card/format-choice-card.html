<div
  class="w-full max-w-md rounded-2xl border border-white/10 bg-white/[0.03] overflow-hidden shadow-lg shadow-black/20"
>
  <div class="flex items-center gap-3 p-4 border-b border-white/5">
    <div
      class="w-10 h-10 rounded-xl bg-primary/15 border border-primary/30 flex items-center justify-center shrink-0"
    >
      <i class="pi pi-file-pdf text-primary text-lg"></i>
    </div>
    <div class="min-w-0">
      <h4 class="text-sm font-semibold text-white">
        {{ 'chat.branding.format.title' | translate }}
      </h4>
      <p class="text-[11px] text-gray-500">{{ 'chat.branding.format.subtitle' | translate }}</p>
    </div>
  </div>

  <div class="p-4 grid grid-cols-2 gap-3">
    <!-- Portrait A4 -->
    <button
      type="button"
      (click)="pick('A4_PORTRAIT')"
      [disabled]="disabled() || (!!selected() && selected() !== 'A4_PORTRAIT')"
      class="group flex flex-col items-center gap-3 p-4 rounded-xl border transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed"
      [class.border-primary]="selected() === 'A4_PORTRAIT'"
      [class.bg-primary/10]="selected() === 'A4_PORTRAIT'"
      [class.border-white/10]="selected() !== 'A4_PORTRAIT'"
      [class.hover:border-primary/40]="!selected() && !disabled()"
      [class.hover:bg-white/5]="!selected() && !disabled()"
    >
      <span
        class="w-10 h-14 rounded-md border-2 bg-white/5 transition-colors duration-200"
        [class.border-primary]="selected() === 'A4_PORTRAIT'"
        [class.border-white/25]="selected() !== 'A4_PORTRAIT'"
      ></span>
      <span class="text-xs font-medium" [class.text-white]="true">
        {{ 'chat.branding.format.portrait' | translate }}
      </span>
      @if (selected() === 'A4_PORTRAIT') {
        <i class="pi pi-check-circle text-primary text-sm"></i>
      }
    </button>

    <!-- Paysage 16:9 -->
    <button
      type="button"
      (click)="pick('SLIDE_16_9')"
      [disabled]="disabled() || (!!selected() && selected() !== 'SLIDE_16_9')"
      class="group flex flex-col items-center gap-3 p-4 rounded-xl border transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed"
      [class.border-primary]="selected() === 'SLIDE_16_9'"
      [class.bg-primary/10]="selected() === 'SLIDE_16_9'"
      [class.border-white/10]="selected() !== 'SLIDE_16_9'"
      [class.hover:border-primary/40]="!selected() && !disabled()"
      [class.hover:bg-white/5]="!selected() && !disabled()"
    >
      <span class="w-14 h-14 flex items-center justify-center">
        <span
          class="w-14 h-9 rounded-md border-2 bg-white/5 transition-colors duration-200"
          [class.border-primary]="selected() === 'SLIDE_16_9'"
          [class.border-white/25]="selected() !== 'SLIDE_16_9'"
        ></span>
      </span>
      <span class="text-xs font-medium text-white">
        {{ 'chat.branding.format.landscape' | translate }}
      </span>
      @if (selected() === 'SLIDE_16_9') {
        <i class="pi pi-check-circle text-primary text-sm"></i>
      }
    </button>
  </div>

  @if (!selected()) {
    <div class="px-4 pb-3 flex items-center justify-between">
      <p class="text-[11px] text-gray-500">{{ 'chat.branding.format.hint' | translate }}</p>
      <button
        type="button"
        (click)="cancel()"
        class="text-[11px] text-gray-500 hover:text-white transition-colors duration-150"
      >
        {{ 'chat.branding.format.cancel' | translate }}
      </button>
    </div>
  }
</div>
