<div
  class="w-full max-w-md rounded-2xl border border-[var(--glass-border)] bg-[var(--glass-bg-subtle)] overflow-hidden shadow-lg shadow-black/20"
>
  <div class="flex items-center gap-3 p-4 border-b border-[var(--glass-border-subtle)]">
    <div
      class="w-10 h-10 rounded-xl bg-primary/15 border border-primary/30 flex items-center justify-center shrink-0"
    >
      <i class="pi pi-file-pdf text-primary text-lg"></i>
    </div>
    <div class="min-w-0">
      <h4 class="text-sm font-semibold text-text-primary">
        {{ 'chat.branding.format.title' | translate }}
      </h4>
      <p class="text-[11px] text-text-tertiary">{{ 'chat.branding.format.subtitle' | translate }}</p>
    </div>
  </div>

  <div class="p-4 grid grid-cols-2 gap-3" role="radiogroup">
    <!-- Portrait A4 -->
    <button
      type="button"
      role="radio"
      [attr.aria-checked]="selected() === 'A4_PORTRAIT'"
      (click)="pick('A4_PORTRAIT')"
      [disabled]="disabled() || (!!selected() && selected() !== 'A4_PORTRAIT')"
      class="choice-tile choice-enter items-center p-4"
      [class.is-selected]="selected() === 'A4_PORTRAIT'"
      [class.is-dimmed]="!!selected() && selected() !== 'A4_PORTRAIT'"
      [style.--i]="0"
    >
      @if (selected() === 'A4_PORTRAIT') {
        <span class="choice-check"><i class="pi pi-check"></i></span>
      }
      <span class="h-16 flex items-center justify-center">
        <span class="w-[44px] h-[60px] rounded-md border-2 border-[var(--glass-border-strong)] bg-[var(--glass-bg-subtle)]"></span>
      </span>
      <span class="mt-2 text-xs font-medium text-text-primary">
        {{ 'chat.branding.format.portrait' | translate }}
      </span>
    </button>

    <!-- Paysage 16:9 -->
    <button
      type="button"
      role="radio"
      [attr.aria-checked]="selected() === 'SLIDE_16_9'"
      (click)="pick('SLIDE_16_9')"
      [disabled]="disabled() || (!!selected() && selected() !== 'SLIDE_16_9')"
      class="choice-tile choice-enter items-center p-4"
      [class.is-selected]="selected() === 'SLIDE_16_9'"
      [class.is-dimmed]="!!selected() && selected() !== 'SLIDE_16_9'"
      [style.--i]="1"
    >
      @if (selected() === 'SLIDE_16_9') {
        <span class="choice-check"><i class="pi pi-check"></i></span>
      }
      <span class="h-16 flex items-center justify-center">
        <span class="w-16 h-10 rounded-md border-2 border-[var(--glass-border-strong)] bg-[var(--glass-bg-subtle)]"></span>
      </span>
      <span class="mt-2 text-xs font-medium text-text-primary">
        {{ 'chat.branding.format.landscape' | translate }}
      </span>
    </button>
  </div>

  @if (!selected()) {
    <div class="px-4 pb-3 flex items-center justify-between">
      <p class="text-[11px] text-text-tertiary">{{ 'chat.branding.format.hint' | translate }}</p>
      <button
        type="button"
        (click)="cancel()"
        class="text-[11px] text-text-tertiary hover:text-text-primary transition-colors duration-150"
      >
        {{ 'chat.branding.format.cancel' | translate }}
      </button>
    </div>
  }
</div>
