<div
  class="w-full max-w-md rounded-2xl border border-white/10 bg-white/[0.03] overflow-hidden shadow-lg shadow-black/20"
>
  <div class="flex items-center gap-3 p-4 border-b border-white/5">
    <div
      class="w-10 h-10 rounded-xl bg-primary/15 border border-primary/30 flex items-center justify-center shrink-0"
    >
      <i class="pi pi-language text-primary text-lg"></i>
    </div>
    <div class="min-w-0">
      <h4 class="text-sm font-semibold text-white">
        {{ 'chat.branding.cards.typographyTitle' | translate }}
      </h4>
      <p class="text-[11px] text-gray-500">
        {{ 'chat.branding.cards.typographySubtitle' | translate }}
      </p>
    </div>
  </div>

  <div class="p-3 space-y-2">
    @for (option of options(); track option.id) {
      <button
        type="button"
        (click)="pick(option)"
        [disabled]="disabled() || (!!selectedId() && selectedId() !== option.id)"
        class="w-full flex items-center justify-between gap-3 px-3 py-2.5 rounded-xl border transition-all duration-200 text-left disabled:opacity-40 disabled:cursor-not-allowed"
        [class.border-primary]="selectedId() === option.id"
        [class.bg-primary/10]="selectedId() === option.id"
        [class.border-white/10]="selectedId() !== option.id"
        [class.hover:border-primary/40]="!selectedId() && !disabled()"
        [class.hover:bg-white/5]="!selectedId() && !disabled()"
      >
        <span class="min-w-0">
          <span class="block text-xs font-medium text-gray-400 truncate">{{ option.name }}</span>
          <span
            class="block text-base text-white truncate"
            [style.font-family]="option.primaryFont"
          >
            {{ option.primaryFont }}
          </span>
          <span
            class="block text-xs text-gray-300 truncate"
            [style.font-family]="option.secondaryFont"
          >
            {{ option.secondaryFont }}
          </span>
        </span>
        @if (selectedId() === option.id) {
          <i class="pi pi-check-circle text-primary text-sm shrink-0"></i>
        }
      </button>
    }
  </div>
</div>
