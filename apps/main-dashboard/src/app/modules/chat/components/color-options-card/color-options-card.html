<div
  class="w-full max-w-md rounded-2xl border border-[var(--glass-border)] bg-[var(--glass-bg-subtle)] overflow-hidden shadow-lg shadow-black/20"
>
  <div class="flex items-center gap-3 p-4 border-b border-[var(--glass-border-subtle)]">
    <div
      class="w-10 h-10 rounded-xl bg-primary/15 border border-primary/30 flex items-center justify-center shrink-0"
    >
      <i class="pi pi-palette text-primary text-lg"></i>
    </div>
    <div class="min-w-0">
      <h4 class="text-sm font-semibold text-text-primary">{{ 'chat.branding.cards.colorsTitle' | translate }}</h4>
      <p class="text-[11px] text-text-tertiary">{{ 'chat.branding.cards.colorsSubtitle' | translate }}</p>
    </div>
  </div>

  <div class="p-3 space-y-2.5" role="radiogroup">
    @for (option of options(); track option.id; let i = $index) {
      <button
        type="button"
        role="radio"
        [attr.aria-checked]="selectedId() === option.id"
        (click)="pick(option)"
        [disabled]="disabled() || (!!selectedId() && selectedId() !== option.id)"
        class="choice-tile choice-enter overflow-hidden"
        [class.is-selected]="selectedId() === option.id"
        [class.is-dimmed]="!!selectedId() && selectedId() !== option.id"
        [style.--i]="i"
        [attr.aria-label]="option.name"
      >
        @if (selectedId() === option.id) {
          <span class="choice-check"><i class="pi pi-check"></i></span>
        }
        <!-- Bande de dégradé d'aperçu -->
        <span class="block h-12 w-full" [style.background]="gradient(option)"></span>
        <span class="flex items-center justify-between gap-2 px-3 py-2.5">
          <span class="text-xs font-medium text-text-secondary truncate">{{ option.name }}</span>
          <span class="flex items-center gap-1 shrink-0">
            @for (swatch of swatches(option); track $index) {
              <span
                class="w-4 h-4 rounded-full border border-[var(--glass-border-medium)]"
                [style.background-color]="swatch"
              ></span>
            }
          </span>
        </span>
      </button>
    }
  </div>
</div>
