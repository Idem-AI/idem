<!-- African Market Focus Section -->
<section class="relative py-20 lg:py-32 overflow-hidden">
  <!-- Background Effects -->
  <div class="absolute inset-0 overflow-hidden">
    <div
      class="absolute top-1/3 left-1/3 w-96 h-96 bg-green-500/10 rounded-full blur-3xl animate-pulse"
    ></div>
    <div
      class="absolute bottom-1/3 right-1/3 w-80 h-80 bg-yellow-500/10 rounded-full blur-3xl animate-pulse delay-1000"
    ></div>
  </div>

  <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Why IDEM for Africa - Bento Grid Layout -->
    <div class="mb-16">
      <div class="text-center mb-12">
        <h3 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-white mb-4">
          Why <span class="i-underline" i18n="@@african-market.idem">IDEM</span> for Africa?
        </h3>
        <p class="text-lg text-white/70 max-w-2xl mx-auto" i18n="@@african-market.builtByAfricans">
          Built by Africans, designed for African success
        </p>
      </div>

      <!-- Bento Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
        @for (advantage of advantages; track advantage.title; let i = $index) {
          <div
            class="group relative overflow-hidden rounded-2xl glass-card border border-white/10 hover:border-primary/30 transition-all duration-300 p-6 lg:p-8"
            [ngClass]="{
              'lg:col-span-2': i === 0,
              'lg:row-span-2': i === 1,
            }"
          >
            <!-- Hover Gradient -->
            <div
              class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"
            ></div>

            <div class="relative">
              <!-- Badge -->
              <div
                class="inline-block px-3 py-1 bg-primary/20 rounded-full text-xs font-bold text-primary mb-4"
                i18n="@@african-market.keyAdvantage"
              >
                Key Advantage
              </div>

              <!-- Title -->
              <h4
                class="text-xl lg:text-2xl font-bold text-white mb-3 group-hover:text-primary transition-colors"
                i18n="@@african-market.advantageTitle"
              >
                {{ advantage.title }}
              </h4>

              <!-- Description -->
              <p
                class="text-white/70 leading-relaxed"
                [ngClass]="i === 0 || i === 1 ? 'text-base lg:text-lg' : 'text-sm lg:text-base'"
                i18n="@@african-market.advantageDescription"
              >
                {{ advantage.description }}
              </p>

              <!-- Decorative Element -->
              <div class="mt-6 flex items-center gap-2">
                <div class="w-8 h-1 bg-primary rounded-full"></div>
                <div class="w-4 h-1 bg-primary/50 rounded-full"></div>
                <div class="w-2 h-1 bg-primary/30 rounded-full"></div>
              </div>
            </div>
          </div>
        }
      </div>
    </div>

 
  </div>
</section>
