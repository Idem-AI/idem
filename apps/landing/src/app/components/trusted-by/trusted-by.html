<div class="relative w-full py-10 border-y border-white/5 bg-transparent mt-12 mb-8 z-10">
  <div class="scroller-container w-full mx-auto">
    <div class="scroller-content gap-20 px-10 items-center justify-around" aria-hidden="true">
      <a 
        *ngFor="let partner of partners" 
        [href]="partner.url" 
        target="_blank" 
        rel="noopener noreferrer"
        class="flex-shrink-0 flex items-center justify-center min-w-[140px]"
        [title]="partner.name"
      >
        <img 
          [src]="partner.logo" 
          [alt]="partner.name + ' logo'" 
          class="h-8 md:h-10 w-auto object-contain partner-logo"
        />
      </a>
    </div>
    
    <!-- Dupliqué pour garantir un scroll infini sans coupure -->

    </div>
  </div>
</div>
