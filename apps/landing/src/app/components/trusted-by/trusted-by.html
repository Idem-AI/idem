<div class="relative w-full py-6 border-t border-white/5 bg-transparent z-10">
  <div class="scroller-container w-full mx-auto">
    <div class="scroller-content gap-20 px-10 items-center justify-around" aria-hidden="true">
      <!-- Première boucle -->
      <a
        *ngFor="let partner of partners"
        [href]="partner.url"
        target="_blank"
        rel="noopener noreferrer"
        class="flex-shrink-0 flex items-center justify-center min-w-[160px]"
        [title]="partner.name"
      >
        <img
          [src]="partner.logo"
          [alt]="partner.name + ' logo'"
          class="h-12 md:h-14 w-auto object-contain partner-logo"
        />
      </a>

      <!-- Deuxième boucle (dupliquée pour scroll infini) -->
      <a
        *ngFor="let partner of partners"
        [href]="partner.url"
        target="_blank"
        rel="noopener noreferrer"
        class="flex-shrink-0 flex items-center justify-center min-w-[160px]"
        [title]="partner.name"
      >
        <img
          [src]="partner.logo"
          [alt]="partner.name + ' logo'"
          class="h-12 md:h-14 w-auto object-contain partner-logo"
        />
      </a>
    </div>
  </div>
</div>
