<div class="hero-section relative min-h-[80vh] md:min-h-screen overflow-hidden flex items-center">
  <!-- Image Watermark - Fixed in corner, visible on all screens -->
  <div
    class="absolute bottom-0 right-0 w-[80%] h-[60%] md:w-[60%] md:h-[80%] opacity-10 md:opacity-15 pointer-events-none"
  >
    <img
      src="/assets/images/home/hero1.webp"
      i18n-alt="@@hero.alt.projectBuilder"
      alt="Idem AI-powered project builder interface showing logo generation, business plan creation, and web application development features"
      loading="eager"
      width="600"
      height="400"
      class="w-full h-full object-contain object-right"
    />
  </div>

  <!-- Main Content - Centered vertically -->
  <div class="relative z-10 w-full px-4 sm:px-6 pt-8 pb-32 md:pt-20 md:pb-36">
    <div class="max-w-6xl mx-auto text-center">
      <!-- Main Headline - Responsive -->
      <div class="mb-6">
        <h1
          class="font-bold text-3xl sm:text-4xl md:text-4xl lg:text-5xl xl:text-7xl 2xl:text-8xl "
          i18n="@@hero.title"
        >
          <span class="">The AI that brings </span>

          <span class=""
            ><span class="i-underline">African startups</span> to life</span
          >
        </h1>
      </div>

      <!-- Description - Responsive -->
      <div class="mb-8 md:mb-12">
        <p
          class="text-sm sm:text-base md:text-lg lg:text-xl xl:text-2xl leading-relaxed max-w-3xl mx-auto px-2"
          style="color: var(--color-text-secondary)"
          i18n="@@hero.description"
        >
          From a simple idea, IDEM builds a complete business.
          <span class="font-black">Strategy, Brand, product, app, everything</span>. Designed for
          Africa, empowering every creator to build, grow, and thrive with full independence.
        </p>
      </div>

      <!-- CTA Buttons - Responsive with stacked mobile -->
      <div
        class="flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-3 sm:gap-4 max-w-md sm:max-w-none mx-auto"
      >
        <a
          href="{{ dashboardUrl }}/create-project"
          class="inner-button w-full sm:w-auto"
          i18n="@@hero.tryForFree"
        >
          Try for free
        </a>
        <a
          href="https://github.com/Idem-AI/idem"
          target="_blank"
          rel="noopener noreferrer"
          class="outer-button w-full sm:w-auto flex items-center justify-center gap-2"
        >
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
            />
          </svg>
          <span i18n="@@hero.viewOnGithub">View on GitHub</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Trusted By section at the bottom of Hero -->
  <div class="absolute bottom-0 left-0 w-full z-20">
    <app-trusted-by></app-trusted-by>
  </div>
</div>
