<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 210" width="920" height="210">

  <!-- Transparent background -->

  <!-- ===== BLUE SQUARE ===== -->
  <rect x="10" y="10" width="200" height="200" rx="12" fill="#2244DD"/>

  <!-- "I" — simple vertical white bar on the left -->
  <rect x="32" y="30" width="26" height="150" rx="4" fill="white"/>

  <!-- "D" — real D letter shape, white -->
  <rect x="78" y="30" width="24" height="150" rx="4" fill="white"/>
  <path d="M100,30 C160,30 192,60 192,105 C192,150 160,180 100,180 L100,156 C148,156 168,138 168,105 C168,72 148,54 100,54 Z" fill="white"/>

  <!-- "i>" INSIDE the D curve -->
  <circle cx="126" cy="72" r="7" fill="#2244DD"/>
  <rect x="120" y="85" width="13" height="22" rx="3" fill="#2244DD"/>
  <polyline points="135,83 152,105 135,127" fill="none" stroke="#2244DD" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== "EPLOY" — white, transparent background, wide enough for Y ===== -->
  <text x="228" y="178"
        font-family="'Arial Black', 'Franklin Gothic Heavy', 'Impact', sans-serif"
        font-size="162"
        font-weight="900"
        fill="white"
        letter-spacing="-2">EPLOY</text>

</svg>
