version: '3.8'

services:
  # Casdoor - Authentication & Authorization
  casdoor:
    image: casbin/casdoor:latest
    container_name: idem-casdoor
    ports:
      - '8000:8000'
    environment:
      - RUNNING_IN_DOCKER=true
    volumes:
      - casdoor-conf:/conf
      - casdoor-data:/var/lib/casdoor
    depends_on:
      - casdoor-db
    networks:
      - idem-network
    restart: unless-stopped

  # PostgreSQL for Casdoor
  casdoor-db:
    image: mysql:8.0
    container_name: idem-casdoor-db
    environment:
      MYSQL_DATABASE: casdoor
      MYSQL_USER: casdoor
      MYSQL_PASSWORD: casdoor_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - casdoor-db-data:/var/lib/mysql
    networks:
      - idem-network
    restart: unless-stopped

  # MinIO - Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: idem-minio
    ports:
      - '9000:9000' # API
      - '9001:9001' # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - idem-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # MongoDB - Main Database
  mongodb:
    image: mongo:7.0
    container_name: idem-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: idem
    volumes:
      - mongodb-data:/data/db
    networks:
      - idem-network
    restart: unless-stopped

volumes:
  casdoor-conf:
  casdoor-data:
  casdoor-db-data:
  minio-data:
  mongodb-data:

networks:
  idem-network:
    driver: bridge
